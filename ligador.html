<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Ligador - MIA FIOD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px; }
        .header { background: linear-gradient(135deg, #CC092F 0%, #8B0620 100%); color: white; padding: 15px 20px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header h1 { font-size: 18px; }
        .btn-sair { background: #ffffff30; border: none; padding: 8px 16px; border-radius: 10px; color: white; cursor: pointer; font-size: 14px; }
        .status-online { position: fixed; top: 10px; right: 10px; background: #27ae60; color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; z-index: 1000; }
        .dashboard { max-width: 1400px; margin: 0 auto; display: flex; gap: 20px; flex-wrap: wrap; }
        .form-col { flex: 1; min-width: 280px; }
        .fila-col { flex: 2; min-width: 300px; }
        .card { background: white; border-radius: 24px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header-card { background: linear-gradient(135deg, #CC092F 0%, #8B0620 100%); color: white; padding: 20px; text-align: center; }
        .form-body { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 14px; color: #333; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 14px; font-size: 16px; }
        input:focus, select:focus { outline: none; border-color: #CC092F; }
        button { width: 100%; background: linear-gradient(135deg, #CC092F 0%, #8B0620 100%); color: white; border: none; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .info-usuario { background: #e8f5e9; padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 13px; color: #2e7d32; }
        .aviso-horario { background: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; margin-bottom: 15px; border-radius: 8px; font-size: 12px; color: #856404; }
        
        /* TELÃO */
        .telao { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 20px; padding: 16px; margin-bottom: 20px; border: 2px solid #CC092F; }
        .telao h3 { color: #CC092F; margin-bottom: 12px; text-align: center; font-size: 16px; }
        .stats { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .stat-card { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 8px; text-align: center; flex: 1; min-width: 70px; }
        .stat-number { font-size: 22px; font-weight: bold; color: white; }
        .stat-label { font-size: 10px; color: #ccc; }
        .fila-lista { max-height: 350px; overflow-y: auto; }
        .fila-item { background: rgba(255,255,255,0.08); padding: 10px; margin-bottom: 5px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; color: white; flex-wrap: wrap; gap: 8px; }
        .fila-nome { font-weight: bold; font-size: 14px; }
        .fila-horario { font-size: 10px; background: #CC092F; padding: 3px 8px; border-radius: 12px; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 12px; }
        .status-em_andamento { background: #2980b9; }
        .status-aguardando { background: #e67e22; }
        .status-encerrado { background: #27ae60; }
        .meu-item { background: rgba(204,9,47,0.5); border-left: 3px solid #CC092F; }
        
        /* ABAS */
        .sub-tabs { display: flex; gap: 8px; margin: 15px 0 12px; flex-wrap: wrap; }
        .sub-tab-btn { background-color: #e0e0e0; color: #333; border: none; padding: 8px 14px; border-radius: 25px; cursor: pointer; font-size: 12px; font-weight: 500; }
        .sub-tab-btn.active { background-color: #CC092F; color: white; }
        .sub-tab-content { display: none; }
        .sub-tab-content.active { display: block; }
        
        /* FORMULÁRIO DE SOLICITAÇÃO */
        .solicitar-lista-form {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .solicitar-lista-form h4 {
            margin-bottom: 12px;
            color: #CC092F;
            font-size: 16px;
        }
        .solicitar-lista-form .form-row {
            margin-bottom: 12px;
        }
        .info-disponivel {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            text-align: center;
            font-size: 13px;
            color: #2e7d32;
        }
        .info-indisponivel {
            background: #fdecea;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            text-align: center;
            font-size: 13px;
            color: #e74c3c;
        }
        
        .lista-card {
            background: white;
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 4px solid #CC092F;
        }
        .lista-card-solicitacao { border-left-color: #e67e22; }
        .lista-card-aprovado { border-left-color: #27ae60; }
        .lista-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 8px; gap: 8px; }
        .lista-banco { background: #1E90FF; color: white; font-weight: bold; font-size: 12px; padding: 4px 10px; border-radius: 20px; display: inline-block; }
        .lista-ddd { font-size: 18px; font-weight: bold; color: #333; }
        .lista-qtd { background: #f0f0f0; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .lista-data { font-size: 11px; color: #888; margin-bottom: 8px; }
        .lista-status { font-size: 12px; font-weight: bold; padding: 4px 10px; border-radius: 20px; display: inline-block; }
        .status-pendente { background: #f39c12; color: white; }
        .status-aprovado { background: #27ae60; color: white; }
        .status-recusado { background: #e74c3c; color: white; }
        .btn-acao { background-color: #2980b9; padding: 6px 16px; border-radius: 25px; font-size: 12px; width: auto; margin-top: 0; }
        
        .agenda-dia { margin-bottom: 15px; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; background: white; }
        .dia-header { background: linear-gradient(135deg, #CC092F 0%, #8B0620 100%); color: white; padding: 10px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }
        .dia-header-finalizados { background: linear-gradient(135deg, #666 0%, #444 100%); color: white; padding: 10px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }
        .dia-fichas { padding: 10px; background: #fafafa; }
        .ficha-card { background: white; border-left: 3px solid #CC092F; padding: 8px; margin-bottom: 6px; border-radius: 8px; font-size: 12px; }
        
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #27ae60; color: white; padding: 12px; border-radius: 12px; text-align: center; z-index: 9999; font-size: 13px; }
        .toast-erro { background: #e74c3c; }
        
        @media (max-width: 600px) {
            body { padding: 10px; }
            .dashboard { flex-direction: column; }
            .fila-col { min-width: auto; }
            .stats { gap: 5px; }
            .stat-card { padding: 5px; }
            .stat-number { font-size: 18px; }
            .lista-header { flex-direction: column; align-items: flex-start; }
            .lista-ddd { font-size: 16px; }
            .sub-tab-btn { padding: 6px 12px; font-size: 11px; }
            .header h1 { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📞 MIA FIOD</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span id="statusIndicator" class="status-online" style="position: relative; top: auto; right: auto;">🟢 Conectado</span>
            <button class="btn-sair" onclick="fazerLogout()">🚪 SAIR</button>
        </div>
    </div>
    <div class="dashboard">
        <div class="form-col">
            <div class="card">
                <div class="header-card"><div style="font-size:40px">📞</div><h1>Novo Agendamento</h1></div>
                <div class="form-body">
                    <div class="info-usuario">✅ Logado: <strong id="nomeUsuario">Carregando...</strong></div>
                    <div class="aviso-horario">⏰ Horário: 08:00 às 17:00 | Intervalo: 10 minutos</div>
                    <form id="formLigador">
                        <div class="form-group"><label>🏦 Banco</label><select id="banco"><option value="pagbank">PAGBANK</option></select></div>
                        <div class="form-group"><label>👤 Cliente *</label><input type="text" id="nomeCliente" required></div>
                        <div class="form-group"><label>📱 Telefone *</label><input type="tel" id="telefoneCliente" required></div>
                        <div class="form-group"><label>📋 Assunto *</label><input type="text" id="assunto" required></div>
                        <div class="form-group"><label>👩‍💼 Gerente</label><input type="text" id="nomeGerente" value="MIA FIOD"></div>
                        <div class="form-group"><label>📅 Data *</label><input type="date" id="dataAgendamento" required></div>
                        <div class="form-group"><label>⏰ Horário *</label><select id="horarioAgendamento" required><option>Selecione uma data</option></select></div>
                        <div class="form-group"><label>🏷️ Vulgo</label><input type="text" id="vulgo" disabled></div>
                        <div class="form-group"><label>💬 WhatsApp</label><input type="tel" id="zap" disabled></div>
                        <button type="submit">📨 AGENDAR</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="fila-col">
            <div class="card">
                <div class="header-card" style="background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);"><div style="font-size:40px">📊</div><h1>Painel do Ligador</h1></div>
                <div class="form-body">
                    <div id="telao" class="telao"><div id="telaoConteudo">Carregando...</div></div>
                    
                    <div class="sub-tabs">
                        <button class="sub-tab-btn active" onclick="switchSubTab('agendamentos')">📋 Meus Agendamentos</button>
                        <button class="sub-tab-btn" onclick="switchSubTab('listas')">📦 Solicitar Lista</button>
                        <button class="sub-tab-btn" onclick="switchSubTab('solicitacoes')">⏳ Solicitações</button>
                        <button class="sub-tab-btn" onclick="switchSubTab('minhaslistas')">📁 Minhas Listas</button>
                    </div>
                    
                    <div id="sub-listas" class="sub-tab-content">
                        <div class="solicitar-lista-form">
                            <h4>📋 Solicitar Lista PAGBANK</h4>
                            <div class="form-row">
                                <label>📞 DDD</label>
                                <input type="number" id="solicitarDDD" placeholder="Ex: 11, 21, 31..." min="10" max="99" inputmode="numeric">
                            </div>
                            <div class="form-row">
                                <label>📊 Quantidade (máx 50)</label>
                                <input type="number" id="solicitarQuantidade" min="1" max="50" value="1" inputmode="numeric">
                            </div>
                            <button onclick="verificarESolicitarLista()" id="btnSolicitar">🔍 Verificar e Solicitar</button>
                            <div id="statusDisponibilidade"></div>
                        </div>
                    </div>
                    
                    <div id="sub-agendamentos" class="sub-tab-content active"><div id="filaStatus"></div></div>
                    <div id="sub-solicitacoes" class="sub-tab-content"><div id="solicitacoes"></div></div>
                    <div id="sub-minhaslistas" class="sub-tab-content"><div id="minhasListas"></div></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let fichas = [], eventSource = null, listasDisponiveisCache = [];
        let usuarioAtual = { nome: '', id: null };
        
        async function verificarSessao() {
            try {
                const res = await fetch('/api/verificar-sessao');
                const data = await res.json();
                if (!data.logado) window.location.href = 'login.html';
                usuarioAtual.nome = data.nome;
                usuarioAtual.id = data.id;
                document.getElementById('nomeUsuario').innerText = usuarioAtual.nome;
                document.getElementById('vulgo').value = usuarioAtual.nome;
                document.getElementById('zap').value = data.whatsapp || '';
                if (data.tipo === 'admin') window.location.href = 'gerente.html';
            } catch(e) { window.location.href = 'login.html'; }
        }
        
        async function fazerLogout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = 'login.html'; }
        
        function formatarHorario(d) { return new Date(d).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }); }
        function formatarData(d) { return new Date(d).toLocaleDateString('pt-BR'); }
        
        // TELÃO
        function atualizarTelao() {
            const container = document.getElementById('telaoConteudo');
            if (!container) return;
            if (!fichas.length) { container.innerHTML = '<div style="text-align:center;padding:20px;">📅 Nenhum agendamento</div>'; return; }
            
            const emAtendimento = fichas.filter(f => f.status === 'em_andamento').length;
            const aguardando = fichas.filter(f => f.status === 'aguardando').length;
            const finalizados = fichas.filter(f => f.status === 'encerrado').length;
            const total = fichas.length;
            
            let html = `<h3>📋 FILA GERAL (${total})</h3>
                <div class="stats">
                    <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">TOTAL</div></div>
                    <div class="stat-card"><div class="stat-number">${emAtendimento}</div><div class="stat-label">ATENDENDO</div></div>
                    <div class="stat-card"><div class="stat-number">${aguardando}</div><div class="stat-label">AGUARDANDO</div></div>
                    <div class="stat-card"><div class="stat-number">${finalizados}</div><div class="stat-label">FINALIZADOS</div></div>
                </div>
                <div class="fila-lista">`;
            
            const todos = [...fichas].sort((a,b) => new Date(b.horarioAgendado) - new Date(a.horarioAgendado)).slice(0, 15);
            todos.forEach(f => {
                const ehMeu = f.vulgo === usuarioAtual.nome;
                let statusText = f.status === 'em_andamento' ? 'ATENDENDO' : (f.status === 'aguardando' ? 'AGUARDANDO' : 'FINALIZADO');
                let statusClass = f.status === 'em_andamento' ? 'status-em_andamento' : (f.status === 'aguardando' ? 'status-aguardando' : 'status-encerrado');
                html += `<div class="fila-item ${ehMeu ? 'meu-item' : ''}">
                    <span class="fila-nome">${f.nomeCliente} ${ehMeu ? '(você)' : ''}</span>
                    <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                        <span class="fila-horario">${formatarData(f.horarioAgendado)} ${formatarHorario(f.horarioAgendado)}</span>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                </div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }
        
        function connectSSE() {
            if (eventSource) eventSource.close();
            eventSource = new EventSource('/api/events');
            eventSource.onopen = () => { document.getElementById('statusIndicator').innerHTML = '🟢 Tempo Real'; document.getElementById('statusIndicator').style.background = '#27ae60'; };
            eventSource.addEventListener('nova-ficha', () => carregarDados());
            eventSource.addEventListener('status-alterado', () => carregarDados());
            eventSource.addEventListener('ficha-excluida', () => carregarDados());
            eventSource.onerror = () => { document.getElementById('statusIndicator').innerHTML = '🔴 Desconectado'; document.getElementById('statusIndicator').style.background = '#e74c3c'; setTimeout(connectSSE, 3000); };
        }
        
        async function carregarDados() {
            try { 
                const res = await fetch('/api/fichas'); 
                fichas = await res.json(); 
                renderizarMeusAgendamentos(); 
                atualizarTelao();
                await carregarListasCache();
            } catch(e) { console.error(e); }
        }
        
        async function carregarListasCache() {
            try {
                const res = await fetch('/api/listas-disponiveis');
                listasDisponiveisCache = await res.json();
            } catch(e) { console.error(e); }
        }
        
        async function verificarESolicitarLista() {
            const ddd = document.getElementById('solicitarDDD').value;
            const quantidade = parseInt(document.getElementById('solicitarQuantidade').value);
            const statusDiv = document.getElementById('statusDisponibilidade');
            
            if (!ddd || ddd < 10 || ddd > 99) {
                statusDiv.innerHTML = '<div class="info-indisponivel">⚠️ Digite um DDD válido (ex: 11, 21, 31)</div>';
                return;
            }
            if (!quantidade || quantidade < 1 || quantidade > 50) {
                statusDiv.innerHTML = '<div class="info-indisponivel">⚠️ Quantidade inválida (1 a 50 fichas)</div>';
                return;
            }
            
            statusDiv.innerHTML = '<div style="text-align:center;padding:10px;">🔍 Verificando disponibilidade...</div>';
            
            await carregarListasCache();
            const listaDisponivel = listasDisponiveisCache.find(l => l.ddd == ddd);
            
            if (!listaDisponivel || listaDisponivel.quantidade < quantidade) {
                const disponivel = listaDisponivel ? listaDisponivel.quantidade : 0;
                statusDiv.innerHTML = `<div class="info-indisponivel">❌ Lista indisponível!<br>PAGBANK DDD ${ddd} tem apenas ${disponivel} fichas disponíveis.</div>`;
                return;
            }
            
            statusDiv.innerHTML = `<div class="info-disponivel">✅ Lista disponível! ${listaDisponivel.quantidade} fichas encontradas.<br>Enviando solicitação de ${quantidade} fichas...</div>`;
            
            try {
                const response = await fetch('/api/solicitar-lista', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ lista_id: listaDisponivel.id, quantidade: quantidade }) 
                });
                if (response.ok) { 
                    statusDiv.innerHTML = `<div class="info-disponivel">✅ Solicitação de ${quantidade} fichas enviada! Aguarde aprovação da gerente.</div>`;
                    document.getElementById('solicitarDDD').value = '';
                    document.getElementById('solicitarQuantidade').value = '1';
                    carregarSolicitacoes();
                } else { 
                    const data = await response.json();
                    statusDiv.innerHTML = `<div class="info-indisponivel">❌ Erro: ${data.erro || 'Tente novamente'}</div>`;
                }
            } catch(e) { 
                statusDiv.innerHTML = '<div class="info-indisponivel">❌ Erro de conexão. Tente novamente.</div>';
            }
        }
        
        async function atualizarHorarios() {
            const data = document.getElementById('dataAgendamento').value;
            const select = document.getElementById('horarioAgendamento');
            if (!data) { select.innerHTML = '<option>Selecione uma data</option>'; return; }
            try {
                const res = await fetch(`/api/horarios-disponiveis?data=${data}`);
                const dataRes = await res.json();
                if (!dataRes.horarios.length) select.innerHTML = '<option>Nenhum horário disponível</option>';
                else { select.innerHTML = '<option value="">Selecione um horário</option>'; dataRes.horarios.forEach(h => { const opt = document.createElement('option'); opt.value = h; opt.textContent = h; select.appendChild(opt); }); }
            } catch(e) { console.error(e); }
        }
        
        function renderizarMeusAgendamentos() {
            const container = document.getElementById('filaStatus');
            if (!container) return;
            const meus = fichas.filter(f => f.vulgo === usuarioAtual.nome);
            if (!meus.length) { container.innerHTML = '<div style="text-align:center;padding:20px;">✅ Nenhum agendamento seu</div>'; return; }
            
            const ativos = meus.filter(f => f.status !== 'encerrado');
            const finalizados = meus.filter(f => f.status === 'encerrado');
            let html = `<div style="margin-bottom:8px;"><strong>Total: ${meus.length}</strong> | 🟡 Ativos: ${ativos.length} | ✅ Finalizados: ${finalizados.length}</div>`;
            
            if (ativos.length) {
                const grupos = {};
                ativos.forEach(f => { const d = f.horarioAgendado.split('T')[0]; if (!grupos[d]) grupos[d] = []; grupos[d].push(f); });
                for (const data of Object.keys(grupos).sort().reverse()) {
                    html += `<div class="agenda-dia"><div class="dia-header" onclick="toggleDia('meus-ativos-${data}')">📅 ${data} <span>🟡 ${grupos[data].length}</span></div><div class="dia-fichas" id="meus-ativos-${data}">`;
                    grupos[data].forEach(f => {
                        let statusText = f.status === 'aguardando' ? '<span class="status-aguardando">🟡 Aguardando</span>' : '<span class="status-em_andamento">🔵 Em andamento</span>';
                        html += `<div class="ficha-card"><strong>${f.nomeCliente}</strong> <span style="background:#CC092F; color:white; padding:2px 6px; border-radius:8px; font-size:10px;">${formatarHorario(f.horarioAgendado)}</span><br>📋 ${f.assunto}<br>${statusText}</div>`;
                    });
                    html += `</div></div>`;
                }
            }
            
            if (finalizados.length) {
                html += `<div class="agenda-dia"><div class="dia-header-finalizados" onclick="toggleDia('meus-finalizados')">✅ FINALIZADOS <span>✅ ${finalizados.length}</span></div><div class="dia-fichas" id="meus-finalizados">`;
                finalizados.slice(-10).reverse().forEach(f => {
                    html += `<div class="ficha-card"><strong>${f.nomeCliente}</strong> <span style="background:#27ae60; color:white; padding:2px 6px; border-radius:8px; font-size:10px;">${formatarHorario(f.horarioAgendado)}</span><br>📋 ${f.assunto}<br><span class="status-encerrado">✅ Encerrado</span>${f.observacao ? `<br>📝 ${f.observacao}` : ''}</div>`;
                });
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }
        
        window.toggleDia = function(id) { const el = document.getElementById(id); if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none'; };
        
        document.getElementById('dataAgendamento').addEventListener('change', atualizarHorarios);
        document.getElementById('dataAgendamento').min = new Date().toISOString().split('T')[0];
        
        document.getElementById('formLigador').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = document.getElementById('dataAgendamento').value;
            const hora = document.getElementById('horarioAgendamento').value;
            const banco = document.getElementById('banco').value;
            if (!data || !hora) { showToast('Selecione DATA e HORÁRIO!', true); return; }
            
            const ficha = {
                nomeCliente: document.getElementById('nomeCliente').value,
                telefoneCliente: document.getElementById('telefoneCliente').value,
                assunto: document.getElementById('assunto').value,
                nomeGerente: document.getElementById('nomeGerente').value || 'MIA FIOD',
                horarioAgendado: `${data}T${hora}:00`,
                vulgo: document.getElementById('vulgo').value,
                zap: document.getElementById('zap').value,
                banco: banco
            };
            if (!ficha.nomeCliente || !ficha.telefoneCliente || !ficha.assunto) { showToast('Preencha todos os dados!', true); return; }
            
            try {
                const res = await fetch('/api/fichas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(ficha) });
                if (res.ok) {
                    document.getElementById('formLigador').reset();
                    document.getElementById('dataAgendamento').value = '';
                    document.getElementById('horarioAgendamento').innerHTML = '<option>Selecione uma data</option>';
                    document.getElementById('vulgo').value = usuarioAtual.nome;
                    showToast('✅ Agendado!');
                    carregarDados();
                } else { const err = await res.json(); showToast(err.error || 'Erro', true); }
            } catch(e) { showToast('Erro de conexão', true); }
        });
        
        async function carregarSolicitacoes() {
            try {
                const res = await fetch('/api/minhas-solicitacoes');
                const sols = await res.json();
                const container = document.getElementById('solicitacoes');
                if (!sols.length) { container.innerHTML = '<div style="text-align:center;padding:30px;">📭 Nenhuma solicitação encontrada</div>'; return; }
                
                let html = '';
                for (const s of sols) {
                    let statusClass = '', statusText = '';
                    if (s.status === 'pendente') { statusClass = 'status-pendente'; statusText = '⏳ Pendente'; }
                    else if (s.status === 'aprovado') { statusClass = 'status-aprovado'; statusText = '✅ Aprovado'; }
                    else { statusClass = 'status-recusado'; statusText = '❌ Recusado'; }
                    
                    html += `
                        <div class="lista-card lista-card-solicitacao">
                            <div class="lista-header">
                                <span class="lista-banco">🏦 PAGBANK</span>
                                <span class="lista-ddd">📞 DDD ${s.ddd}</span>
                            </div>
                            <div class="lista-data">📅 Solicitação: ${new Date(s.data_solicitacao).toLocaleDateString()}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-top: 8px;">
                                <span class="lista-qtd">📊 Quantidade: ${s.quantidade} fichas</span>
                                <span class="lista-status ${statusClass}">${statusText}</span>
                            </div>
                            ${s.data_autorizacao ? `<div class="lista-data" style="margin-top:5px;">✅ Autorizado em: ${new Date(s.data_autorizacao).toLocaleDateString()}</div>` : ''}
                        </div>`;
                }
                container.innerHTML = html;
            } catch(e) { console.error(e); }
        }
        
        async function carregarMinhasListas() {
            try {
                const res = await fetch('/api/minhas-listas');
                const listas = await res.json();
                const container = document.getElementById('minhasListas');
                if (!listas.length) { container.innerHTML = '<div style="text-align:center;padding:30px;">📭 Nenhuma lista autorizada ainda</div>'; return; }
                
                let html = '';
                for (const l of listas) {
                    html += `
                        <div class="lista-card lista-card-aprovado">
                            <div class="lista-header">
                                <span class="lista-banco">🏦 PAGBANK</span>
                                <span class="lista-ddd">📞 DDD ${l.ddd}</span>
                            </div>
                            <div class="lista-data">📅 Disponível desde: ${new Date(l.data_obtencao).toLocaleDateString()}</div>
                            <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                                <button class="btn-acao" onclick="downloadLista(${l.id})">📥 Baixar Lista</button>
                            </div>
                        </div>`;
                }
                container.innerHTML = html;
            } catch(e) { console.error(e); }
        }
        
        async function downloadLista(id) { window.open(`/api/download-lista/${id}`, '_blank'); }
        
        function switchSubTab(tab) {
            document.querySelectorAll('.sub-tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`sub-${tab}`).classList.add('active');
            if (tab === 'agendamentos') carregarDados();
            if (tab === 'solicitacoes') carregarSolicitacoes();
            if (tab === 'minhaslistas') carregarMinhasListas();
        }
        
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.classList.add('toast-erro');
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        verificarSessao();
        connectSSE();
        carregarDados();
        setInterval(() => { if(document.getElementById('dataAgendamento').value) atualizarHorarios(); carregarDados(); }, 10000);
        
        window.verificarESolicitarLista = verificarESolicitarLista;
        window.downloadLista = downloadLista;
    </script>
</body>
</html>
