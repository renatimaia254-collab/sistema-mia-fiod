<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MIA FIOD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
        .card { background: white; border-radius: 28px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .logo { text-align: center; font-size: 48px; margin-bottom: 20px; }
        h1 { text-align: center; color: #CC092F; margin-bottom: 30px; font-size: 24px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 14px; font-size: 16px; }
        input:focus { outline: none; border-color: #CC092F; }
        button { width: 100%; background: linear-gradient(135deg, #CC092F 0%, #8B0620 100%); color: white; border: none; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #CC092F; text-decoration: none; }
        .erro, .sucesso { padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; display: none; }
        .erro { background: #fdecea; color: #e74c3c; }
        .sucesso { background: #e8f5e9; color: #27ae60; }
        .info { font-size: 12px; color: #666; margin-top: -10px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📝</div>
        <h1>Criar Conta</h1>
        <div id="erroMsg" class="erro"></div>
        <div id="sucessoMsg" class="sucesso"></div>
        <input type="text" id="nome" placeholder="Nome completo" autocomplete="off">
        <input type="email" id="email" placeholder="E-mail" autocomplete="off">
        <input type="tel" id="whatsapp" placeholder="WhatsApp (11 99999-9999)" autocomplete="off">
        <div class="info">📱 Seu WhatsApp será usado para identificar você nos agendamentos</div>
        <input type="password" id="senha" placeholder="Senha">
        <input type="password" id="confirmarSenha" placeholder="Confirmar senha">
        <button onclick="fazerCadastro()">Cadastrar</button>
        <div class="link"><a href="login.html">Já tem conta? Faça login</a></div>
    </div>
    <script>
        async function fazerCadastro() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const senha = document.getElementById('senha').value;
            const confirmar = document.getElementById('confirmarSenha').value;
            const erroDiv = document.getElementById('erroMsg');
            const sucessoDiv = document.getElementById('sucessoMsg');
            
            erroDiv.style.display = 'none';
            sucessoDiv.style.display = 'none';
            
            if (!nome || !email || !whatsapp || !senha) {
                erroDiv.style.display = 'block';
                erroDiv.innerHTML = 'Preencha todos os campos!';
                return;
            }
            if (senha !== confirmar) {
                erroDiv.style.display = 'block';
                erroDiv.innerHTML = 'As senhas não coincidem!';
                return;
            }
            if (senha.length < 4) {
                erroDiv.style.display = 'block';
                erroDiv.innerHTML = 'Senha deve ter no mínimo 4 caracteres!';
                return;
            }
            const whatsappLimpo = whatsapp.replace(/\D/g, '');
            if (whatsappLimpo.length < 10) {
                erroDiv.style.display = 'block';
                erroDiv.innerHTML = 'WhatsApp inválido! Digite um número válido (DDD + número)';
                return;
            }
            try {
                const response = await fetch('/api/cadastrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha, whatsapp: whatsappLimpo })
                });
                const data = await response.json();
                if (response.ok) {
                    sucessoDiv.style.display = 'block';
                    sucessoDiv.innerHTML = 'Cadastro realizado! Redirecionando...';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    erroDiv.style.display = 'block';
                    erroDiv.innerHTML = data.erro;
                }
            } catch (error) {
                erroDiv.style.display = 'block';
                erroDiv.innerHTML = 'Erro de conexão!';
            }
        }
    </script>
</body>
</html>
