<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIA FIOD - Sistema de Gestão</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 50px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            color: #CC092F;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn {
            display: block;
            background: linear-gradient(135deg, #CC092F 0%, #8B0620 100%);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 15px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-admin {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
        }
        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">👑</div>
        <h1>MIA FIOD</h1>
        <div class="subtitle">Sistema de Gestão de Atendimentos</div>
        <a href="login.html" class="btn">🔐 ACESSAR SISTEMA</a>
        <a href="cadastro.html" class="btn btn-admin">📝 CADASTRAR-SE</a>
        <div class="footer">
            © 2026 MIA FIOD - Todos os direitos reservados
        </div>
    </div>
</body>
</html>
